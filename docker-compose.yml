version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sbschoolmanager-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: EscuelaSkate
      MYSQL_USER: skateuser
      MYSQL_PASSWORD: skatepassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - sbschoolmanager-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot:
    build:
      context: ./sbschoolmanager-api
      dockerfile: Dockerfile
    container_name: sbschoolmanager-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/EscuelaSkate?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: skateuser
      SPRING_DATASOURCE_PASSWORD: skatepassword
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sbschoolmanager-network

volumes:
  mysql_data:

networks:
  sbschoolmanager-network:
    driver: bridge
